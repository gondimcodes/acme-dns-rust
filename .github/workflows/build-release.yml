name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*' # Trigger build on version tags (e.g. v1.0.0)

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            acme-dns-client-rust/target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build for Linux (amd64)
        run: |
          cargo build --release
          cd acme-dns-client-rust && cargo build --release

      - name: Package Linux Binaries
        run: |
          mkdir -p dist
          cp target/release/acme-dns-rust dist/acme-dns-rust
          cp acme-dns-client-rust/target/release/acme-dns-client-rust dist/acme-dns-client-rust
          cd dist
          tar -czf acme-dns-rust-linux-amd64.tar.gz acme-dns-rust
          tar -czf acme-dns-client-rust-linux-amd64.tar.gz acme-dns-client-rust

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/acme-dns-rust-linux-amd64.tar.gz
            dist/acme-dns-client-rust-linux-amd64.tar.gz

  build-freebsd:
    name: Build FreeBSD (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y rust sqlite3 postgresql15-client
          run: |
            cargo build --release
            cd acme-dns-client-rust && cargo build --release

      - name: Package FreeBSD Binaries
        run: |
          mkdir -p dist
          cp target/release/acme-dns-rust dist/acme-dns-rust
          cp acme-dns-client-rust/target/release/acme-dns-client-rust dist/acme-dns-client-rust
          cd dist
          tar -czf acme-dns-rust-freebsd-amd64.tar.gz acme-dns-rust
          tar -czf acme-dns-client-rust-freebsd-amd64.tar.gz acme-dns-client-rust

      - name: Upload FreeBSD Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-binaries
          path: |
            dist/acme-dns-rust-freebsd-amd64.tar.gz
            dist/acme-dns-client-rust-freebsd-amd64.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-linux, build-freebsd]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist/

      - name: Download FreeBSD Artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-binaries
          path: dist/

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/acme-dns-rust-linux-amd64.tar.gz
            dist/acme-dns-client-rust-linux-amd64.tar.gz
            dist/acme-dns-rust-freebsd-amd64.tar.gz
            dist/acme-dns-client-rust-freebsd-amd64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
