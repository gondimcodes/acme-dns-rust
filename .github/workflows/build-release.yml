name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*' # Trigger build on version tags (e.g. v1.0.0)

jobs:
  build:
    name: Build Multiplatform Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            x86_64-unknown-freebsd

      - name: Install Zig (for cross-compilation linking)
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            acme-dns-client-rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check and Format Check
        run: |
          cargo check
          cd acme-dns-client-rust && cargo check

      - name: Build for Linux (amd64)
        run: |
          cargo build --release
          cd acme-dns-client-rust && cargo build --release

      - name: Build for FreeBSD (amd64)
        env:
          AWS_LC_SYS_NO_ASM: 1
        run: |
          cargo zigbuild --release --target x86_64-unknown-freebsd
          cd acme-dns-client-rust && cargo zigbuild --release --target x86_64-unknown-freebsd


      - name: Compress and Package Binaries
        run: |
          mkdir -p dist
          
          # Linux packaging
          cp target/release/acme-dns-rust dist/acme-dns-rust
          cp acme-dns-client-rust/target/release/acme-dns-client-rust dist/acme-dns-client-rust
          cd dist
          tar -czf acme-dns-rust-linux-amd64.tar.gz acme-dns-rust
          tar -czf acme-dns-client-rust-linux-amd64.tar.gz acme-dns-client-rust
          rm acme-dns-rust acme-dns-client-rust
          cd ..

          
          # FreeBSD packaging
          cp target/x86_64-unknown-freebsd/release/acme-dns-rust dist/acme-dns-rust
          cp acme-dns-client-rust/target/x86_64-unknown-freebsd/release/acme-dns-client-rust dist/acme-dns-client-rust
          cd dist
          tar -czf acme-dns-rust-freebsd-amd64.tar.gz acme-dns-rust
          tar -czf acme-dns-client-rust-freebsd-amd64.tar.gz acme-dns-client-rust
          rm acme-dns-rust acme-dns-client-rust
          cd ..

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/acme-dns-rust-linux-amd64.tar.gz
            dist/acme-dns-client-rust-linux-amd64.tar.gz
            dist/acme-dns-rust-freebsd-amd64.tar.gz
            dist/acme-dns-client-rust-freebsd-amd64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
